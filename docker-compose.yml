# -------------------------------------------------------
# LOCAL TESTING ONLY
# For production, frontend is on Vercel (scrapee-wine.vercel.app)
# and backend is on Vercel (scrapee-backend.vercel.app)
# Run locally: docker-compose up
# -------------------------------------------------------

version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 'True'
    volumes:
      - ./backend:/app
    command: python app.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Points to local backend container for docker-compose testing
      NEXT_PUBLIC_API_URL: http://backend:8080
    depends_on:
      - backend
    command: npm run dev
